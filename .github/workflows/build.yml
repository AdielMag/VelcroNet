name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AetherNet.sln

      - name: Build
        run: dotnet build AetherNet.sln --no-restore -c Release

      - name: Test
        run: dotnet test tests/AetherNet.Tests/AetherNet.Tests.csproj --no-build -c Release --logger "console;verbosity=normal"
